name: C++ CI

on:
  pull_request:



jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build
        run: make

      - name: Run program
        run: ./rpn < input.txt

